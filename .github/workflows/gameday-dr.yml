name: gameday-dr

# Ejecucion programada del verify-dr.mjs por tier:
#   - Tier 0/1: mensual (primer lunes 10:00 UTC).
#   - Tier 2: trimestral (primer lunes Ene/Abr/Jul/Oct 10:00 UTC).
#   - Tier 3: anual (primer lunes Enero 10:00 UTC).
#
# Tambien permite workflow_dispatch para correr ad-hoc.
# El JSON resultante se sube como artefacto y se publica como comentario en el issue de tracking.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Entorno donde correr la verificacion DR
        required: true
        type: choice
        options: [dev, staging, prod, dr-test]
      tier:
        description: Tier del servicio
        required: true
        type: choice
        options: [tier-0, tier-1, tier-2, tier-3]
      post_failover:
        description: Marca como post-failover (cambia interpretacion de checks)
        required: false
        default: false
        type: boolean
  schedule:
    # Tier 0 y 1: primer lunes de cada mes 10:00 UTC.
    - cron: '0 10 1-7 * 1'

permissions:
  id-token: write
  contents: read
  issues: write

concurrency:
  group: gameday-dr-${{ github.event.inputs.environment || 'auto' }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      environments: ${{ steps.gate.outputs.environments }}
      tier: ${{ steps.gate.outputs.tier }}
      post-failover: ${{ steps.gate.outputs.post-failover }}
    steps:
      - id: gate
        name: Resolver entornos a ensayar
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "environments=[\"${{ github.event.inputs.environment }}\"]" >> "$GITHUB_OUTPUT"
            echo "tier=${{ github.event.inputs.tier }}" >> "$GITHUB_OUTPUT"
            echo "post-failover=${{ github.event.inputs.post_failover }}" >> "$GITHUB_OUTPUT"
          else
            # Cron mensual: solo Tier 0/1, contra dr-test (region pasiva).
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo 'environments=["dr-test"]' >> "$GITHUB_OUTPUT"
            echo "tier=tier-1" >> "$GITHUB_OUTPUT"
            echo "post-failover=false" >> "$GITHUB_OUTPUT"
          fi

  verify:
    name: GameDay DR ${{ matrix.environment }}
    needs: preflight
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.preflight.outputs.environments) }}
    environment:
      name: ${{ matrix.environment }}
    env:
      DR_KUBECONFIG_VALUE: ${{ secrets.DR_KUBECONFIG }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: '20'

      - uses: azure/setup-kubectl@v5

      - name: Preparar kubeconfig
        if: env.DR_KUBECONFIG_VALUE != ''
        id: kubeconfig
        shell: bash
        run: |
          kubeconfig_file="$RUNNER_TEMP/dr.kubeconfig"
          printf '%s' "$DR_KUBECONFIG_VALUE" > "$kubeconfig_file"
          chmod 600 "$kubeconfig_file"
          echo "path=$kubeconfig_file" >> "$GITHUB_OUTPUT"

      - name: Ejecutar verify-dr (JSON)
        id: verify
        shell: bash
        run: |
          args=(
            --region secondary
            --env "${{ matrix.environment }}"
            --json
            --threshold-error-rate "${{ vars.DR_ERROR_RATE_THRESHOLD || '0.01' }}"
          )
          if [[ -n "${{ steps.kubeconfig.outputs.path }}" ]]; then
            args+=(--kubeconfig "${{ steps.kubeconfig.outputs.path }}")
          fi
          if [[ -n "${{ vars.DR_KUBECTL_CONTEXT }}" ]]; then
            args+=(--kubectl-context "${{ vars.DR_KUBECTL_CONTEXT }}")
          fi
          if [[ -n "${{ vars.DR_NAMESPACE }}" ]]; then
            args+=(--namespace "${{ vars.DR_NAMESPACE }}")
          fi
          if [[ -n "${{ vars.DR_PROMETHEUS_URL }}" ]]; then
            args+=(--prometheus-url "${{ vars.DR_PROMETHEUS_URL }}")
          fi
          if [[ "${{ needs.preflight.outputs.post-failover }}" == "true" ]]; then
            args+=(--post-failover)
          fi
          set +e
          node ops/runbooks/verify-dr.mjs "${args[@]}" > verify-output.json
          status=$?
          set -e
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat verify-output.json
          if [[ $status -ne 0 ]]; then
            echo "verify-dr.mjs reporto fallos (exit $status)."
          fi

      - name: Adjuntar resultado JSON al run
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: gameday-${{ matrix.environment }}-${{ github.run_id }}
          path: verify-output.json
          retention-days: 365

      - name: Abrir issue de seguimiento si verify fallo
        if: steps.verify.outputs.status != '0' && github.event_name == 'schedule'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync('verify-output.json', 'utf8');
            const title = `GameDay DR fallo: ${{ matrix.environment }} (${new Date().toISOString().slice(0,10)})`;
            const body = [
              '`verify-dr.mjs` reporto fallos durante el GameDay programado.',
              '',
              '## Resultado JSON',
              '```json',
              output,
              '```',
              '',
              '## Action items',
              '- [ ] Revisar checks fallidos.',
              '- [ ] Si confirma issue real, abrir incidente segun [docs/transversal/90.24-gestion-incidentes.md](../docs/transversal/90.24-gestion-incidentes.md).',
              '- [ ] Cerrar este issue dentro de 5 dias habiles con resumen.',
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['gameday-dr', 'reliability'],
            });

      - name: Fallar workflow si verify fallo
        if: steps.verify.outputs.status != '0'
        run: exit 1

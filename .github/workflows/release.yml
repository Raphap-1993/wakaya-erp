name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Extract release notes from releases/
        id: notes
        run: |
          tag="${GITHUB_REF_NAME}"
          file="releases/${tag}.md"
          if [ -f "$file" ]; then
            {
              echo "content<<EOF"
              cat "$file"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "content=Release notes missing at ${file}." >> "$GITHUB_OUTPUT"
          fi
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.notes.outputs.content }}
          draft: false
          prerelease: false

  build-and-push:
    needs: release-notes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: node-next
            context: stacks/node-next/template
            dockerfile: stacks/node-next/template/Dockerfile
          - image: java-monolith
            context: stacks/java-monolith/template
            dockerfile: stacks/java-monolith/template/Dockerfile
          - image: quarkus-backend
            context: stacks/quarkus-angular/template/backend
            dockerfile: stacks/quarkus-angular/template/backend/Dockerfile
          - image: quarkus-frontend
            context: stacks/quarkus-angular/template/frontend
            dockerfile: stacks/quarkus-angular/template/frontend/Dockerfile
          - image: spring-backend
            context: stacks/spring-react/template/backend
            dockerfile: stacks/spring-react/template/backend/Dockerfile
          - image: spring-frontend
            context: stacks/spring-react/template/frontend
            dockerfile: stacks/spring-react/template/frontend/Dockerfile
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/${{ matrix.image }}:latest
          provenance: true
          sbom: true
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
      - name: Trivy scan of released image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ github.repository }}/${{ matrix.image }}:${{ github.ref_name }}
          severity: CRITICAL,HIGH
          exit-code: '1'
          ignore-unfixed: true
      - name: Install cosign
        uses: sigstore/cosign-installer@v3
      - name: Sign image with cosign (keyless)
        env:
          COSIGN_EXPERIMENTAL: '1'
        run: |
          cosign sign --yes \
            ghcr.io/${{ github.repository }}/${{ matrix.image }}@${{ steps.build.outputs.digest }}
      - name: GitHub attestation (SLSA provenance)
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}/${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

name: rotate-secrets

# Rotacion de secretos operada por CI:
#   - Manual: workflow_dispatch con inputs (entorno, secret, modo).
#   - Programada: cron trimestral cubre los secretos rotativos automaticamente.
#
# Autenticacion al provider via OIDC de GitHub Actions (sin secretos de larga vida).
# El audit log generado por rotate-secrets.mjs se sube a un bucket con Object Lock.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Entorno donde rotar
        required: true
        type: choice
        options: [dev, staging, prod]
      target:
        description: Secret a rotar (ej. db-credentials, jwt-signing-key, api-key-stripe)
        required: true
        type: string
      mode:
        description: Modo de ejecucion
        required: true
        type: choice
        default: dry-run
        options: [dry-run, apply, verify, retire-previous]
  schedule:
    # 03:00 UTC del primer lunes de cada trimestre. Cron de GitHub Actions no soporta
    # nth-day-of-month nativo, asi que se evalua y se filtra en el job initial.
    - cron: '0 3 1-7 1,4,7,10 1'

permissions:
  id-token: write    # OIDC
  contents: read

concurrency:
  group: rotate-secrets-${{ github.event.inputs.environment || 'all' }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    outputs:
      should-run: ${{ steps.gate.outputs.should-run }}
      environments: ${{ steps.gate.outputs.environments }}
    steps:
      - id: gate
        name: Resolver entornos a rotar
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo "environments=[\"${{ github.event.inputs.environment }}\"]" >> "$GITHUB_OUTPUT"
          else
            # En el cron del primer lunes: dev y staging automaticos. prod requiere dispatch manual.
            echo "should-run=true" >> "$GITHUB_OUTPUT"
            echo 'environments=["dev","staging"]' >> "$GITHUB_OUTPUT"
          fi

  rotate:
    name: Rotar secretos en ${{ matrix.environment }}
    needs: preflight
    if: needs.preflight.outputs.should-run == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: ${{ fromJson(needs.preflight.outputs.environments) }}
    environment:
      name: ${{ matrix.environment }}
    env:
      SECRETS_KUBECONFIG_VALUE: ${{ secrets.SECRETS_KUBECONFIG }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup kubectl (si hay kubeconfig)
        if: env.SECRETS_KUBECONFIG_VALUE != ''
        uses: azure/setup-kubectl@v5

      - name: Preparar kubeconfig para convergencia de secretos
        if: env.SECRETS_KUBECONFIG_VALUE != ''
        id: kubeconfig
        shell: bash
        run: |
          kubeconfig_file="$RUNNER_TEMP/rotate-secrets.kubeconfig"
          printf '%s' "$SECRETS_KUBECONFIG_VALUE" > "$kubeconfig_file"
          chmod 600 "$kubeconfig_file"
          echo "path=$kubeconfig_file" >> "$GITHUB_OUTPUT"

      - name: Configurar credenciales AWS via OIDC (si provider=aws)
        if: vars.SECRETS_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROTATE_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Configurar credenciales GCP via OIDC (si provider=gcp)
        if: vars.SECRETS_PROVIDER == 'gcp'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_ROTATE_SA }}

      - name: Vault token via OIDC (si provider=vault)
        if: vars.SECRETS_PROVIDER == 'vault'
        uses: hashicorp/vault-action@v4
        with:
          url: ${{ vars.VAULT_URL }}
          method: jwt
          role: rotate-secrets-${{ matrix.environment }}
          exportToken: true

      - name: Determinar modo y target
        id: params
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "mode=${{ github.event.inputs.mode }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ github.event.inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            # Cron rota los secretos rotativos baseline en modo apply.
            echo "mode=apply" >> "$GITHUB_OUTPUT"
            echo "target=db-credentials" >> "$GITHUB_OUTPUT"
          fi

      - name: Preparar nombre de audit log
        id: audit
        shell: bash
        run: |
          echo "path=rotation-${{ matrix.environment }}-$(date -u +%Y%m%dT%H%M%SZ).jsonl" >> "$GITHUB_OUTPUT"

      - name: Ejecutar rotacion
        shell: bash
        run: |
          args=(
            --provider "${{ vars.SECRETS_PROVIDER }}"
            --target "${{ steps.params.outputs.target }}"
            --env "${{ matrix.environment }}"
            --mode "${{ steps.params.outputs.mode }}"
            --audit-log "${{ steps.audit.outputs.path }}"
          )
          if [[ -n "${{ steps.kubeconfig.outputs.path }}" ]]; then
            args+=(--kubeconfig "${{ steps.kubeconfig.outputs.path }}")
          fi
          if [[ -n "${{ vars.SECRETS_KUBECTL_CONTEXT }}" ]]; then
            args+=(--kubectl-context "${{ vars.SECRETS_KUBECTL_CONTEXT }}")
          fi
          node ops/runbooks/rotate-secrets.mjs "${args[@]}"

      - name: Verificar convergencia post-apply
        if: steps.params.outputs.mode == 'apply'
        shell: bash
        run: |
          args=(
            --provider "${{ vars.SECRETS_PROVIDER }}"
            --target "${{ steps.params.outputs.target }}"
            --env "${{ matrix.environment }}"
            --mode verify
            --audit-log "${{ steps.audit.outputs.path }}"
          )
          if [[ -n "${{ steps.kubeconfig.outputs.path }}" ]]; then
            args+=(--kubeconfig "${{ steps.kubeconfig.outputs.path }}")
          fi
          if [[ -n "${{ vars.SECRETS_KUBECTL_CONTEXT }}" ]]; then
            args+=(--kubectl-context "${{ vars.SECRETS_KUBECTL_CONTEXT }}")
          fi
          node ops/runbooks/rotate-secrets.mjs "${args[@]}"

      - name: Subir audit log a bucket inmutable
        if: vars.AUDIT_BUCKET != ''
        shell: bash
        run: |
          aws s3 cp \
            "${{ steps.audit.outputs.path }}" \
            "s3://${{ vars.AUDIT_BUCKET }}/secret-rotation/${{ matrix.environment }}/" \
            --content-type application/x-ndjson

      - name: Adjuntar audit log al run
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rotation-audit-${{ matrix.environment }}
          path: ${{ steps.audit.outputs.path }}
          retention-days: 90

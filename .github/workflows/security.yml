name: security

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true

  sast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Semgrep (SARIF)
        uses: semgrep/semgrep-action@v1
        with:
          config: p/ci
          generateSarif: "1"
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  iac-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: tfsec
        uses: aquasecurity/tfsec-sarif-action@v0.1.4
        with:
          working_directory: ops/infra/aws
          sarif_file: tfsec.sarif
      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec.sarif
          category: tfsec
      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: ops
          quiet: true
          output_format: sarif
          output_file_path: checkov.sarif
          soft_fail: true
      - name: Upload checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov.sarif
          category: checkov

  container-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - name: Build node-next image (local)
        run: |
          docker build -t local/node-next:scan stacks/node-next/template
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local/node-next:scan
          format: sarif
          output: trivy-node-next.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'
      - name: Upload trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-node-next.sarif
          category: trivy-node-next

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Generate SBOM (syft)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: sbom.spdx.json
      - name: Grype vulnerability scan of SBOM
        uses: anchore/scan-action@v7
        with:
          sbom: sbom.spdx.json
          severity-cutoff: high
          fail-build: false
          output-format: sarif
      - name: Upload grype SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: grype

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always

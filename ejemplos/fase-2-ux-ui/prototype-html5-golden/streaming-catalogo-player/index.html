<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FaithStream — Catálogo y reproducción</title>
  <style>
    /* ── Design tokens ── */
    :root {
      --bg: #0a0e1a;
      --surface: #131929;
      --surface2: #1c2640;
      --border: #2a3a5c;
      --text: #f0f4ff;
      --muted: #7a8aaa;
      --gold: #e8b84b;
      --gold-soft: rgba(232,184,75,.15);
      --danger: #e05252;
      --success: #4caf7d;
      --kids-bg: #1a2e4a;
      --kids-accent: #5bb8f5;
      --radius: 10px;
      --shadow: 0 8px 32px rgba(0,0,0,.5);
      font-family: "Segoe UI", Arial, sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); min-height: 100vh; }
    button { font: inherit; cursor: pointer; border: none; border-radius: 6px; padding: 10px 18px; }
    button:focus-visible { outline: 2px solid var(--gold); }

    /* ── Topbar ── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; gap: 18px;
      padding: 0 28px; height: 62px;
      background: rgba(10,14,26,.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 800; font-size: 18px; color: var(--gold); letter-spacing: .5px; }
    .brand-icon { width: 32px; height: 32px; background: var(--gold); border-radius: 8px; display: grid; place-items: center; color: #0a0e1a; font-size: 18px; }
    .topbar-search { flex: 1; max-width: 380px; position: relative; }
    .topbar-search input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px 8px 36px; color: var(--text); font: inherit; font-size: 14px; }
    .topbar-search input::placeholder { color: var(--muted); }
    .topbar-search::before { content: "🔍"; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; pointer-events: none; }
    .topbar-nav { display: flex; gap: 4px; }
    .topbar-nav button { background: transparent; color: var(--muted); padding: 6px 14px; border-radius: 6px; font-size: 14px; }
    .topbar-nav button.active, .topbar-nav button:hover { background: var(--gold-soft); color: var(--gold); }
    .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .profile-btn { display: flex; align-items: center; gap: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 14px; }
    .profile-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); color: #0a0e1a; display: grid; place-items: center; font-weight: 700; font-size: 13px; }
    .mock-badge { background: var(--surface2); border: 1px dashed var(--border); border-radius: 6px; padding: 4px 10px; font-size: 11px; color: var(--muted); }

    /* ── Profile selector overlay ── */
    .overlay { position: fixed; inset: 0; background: rgba(10,14,26,.96); display: none; place-items: center; z-index: 200; }
    .overlay.open { display: grid; }
    .profile-select { text-align: center; }
    .profile-select h2 { font-size: 28px; margin-bottom: 32px; color: var(--text); }
    .profiles-grid { display: grid; grid-template-columns: repeat(4, 140px); gap: 20px; justify-content: center; }
    .profile-card { background: var(--surface); border: 2px solid var(--border); border-radius: 12px; padding: 20px 16px; cursor: pointer; transition: border-color .2s; }
    .profile-card:hover, .profile-card.selected { border-color: var(--gold); }
    .profile-card .av { width: 72px; height: 72px; border-radius: 50%; display: grid; place-items: center; font-size: 32px; margin: 0 auto 12px; }
    .profile-card .name { font-size: 14px; font-weight: 600; }
    .profile-card .age { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Hero ── */
    .hero {
      position: relative; min-height: 420px;
      background: linear-gradient(135deg, #0d1f3c 0%, #1a2e5a 50%, #0a1628 100%);
      display: flex; align-items: flex-end; padding: 32px 48px;
      overflow: hidden;
    }
    .hero::before {
      content: "✝"; position: absolute; right: 80px; top: 50%; transform: translateY(-50%);
      font-size: 180px; color: rgba(232,184,75,.06); pointer-events: none;
    }
    .hero-content { max-width: 560px; position: relative; z-index: 1; }
    .hero-badge { display: inline-block; background: var(--gold); color: #0a0e1a; border-radius: 4px; padding: 3px 10px; font-size: 12px; font-weight: 700; margin-bottom: 12px; }
    .hero-title { font-size: 36px; font-weight: 800; line-height: 1.15; margin-bottom: 12px; }
    .hero-desc { font-size: 15px; color: #b0bcd0; margin-bottom: 24px; line-height: 1.6; }
    .hero-actions { display: flex; gap: 12px; }
    .btn-primary { background: var(--gold); color: #0a0e1a; font-weight: 700; padding: 12px 28px; border-radius: 8px; font-size: 15px; }
    .btn-secondary { background: rgba(255,255,255,.1); color: var(--text); border: 1px solid rgba(255,255,255,.2); padding: 12px 24px; border-radius: 8px; font-size: 15px; }
    .hero-meta { display: flex; gap: 16px; margin-top: 16px; font-size: 13px; color: var(--muted); }

    /* ── Filters ── */
    .filters-bar { padding: 20px 48px 0; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filter-btn { background: var(--surface); border: 1px solid var(--border); color: var(--muted); border-radius: 20px; padding: 6px 16px; font-size: 13px; }
    .filter-btn.active, .filter-btn:hover { background: var(--gold-soft); color: var(--gold); border-color: var(--gold); }

    /* ── Catalog ── */
    .section { padding: 28px 48px; }
    .section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
    .section-title .icon { font-size: 20px; }
    .posters-row { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
    .poster {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      cursor: pointer; overflow: hidden; transition: transform .2s, border-color .2s;
      position: relative;
    }
    .poster:hover { transform: scale(1.04); border-color: var(--gold); }
    .poster-thumb {
      height: 220px; display: grid; place-items: center;
      background: linear-gradient(160deg, var(--surface2) 0%, #0f1e38 100%);
      font-size: 48px; position: relative;
    }
    .poster-thumb .age-badge {
      position: absolute; top: 8px; right: 8px;
      background: rgba(10,14,26,.85); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 7px; font-size: 11px; color: var(--muted);
    }
    .poster-thumb .progress-bar-mini {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,.1);
    }
    .poster-thumb .progress-fill { height: 100%; background: var(--gold); }
    .poster-thumb .locked-overlay {
      position: absolute; inset: 0; background: rgba(10,14,26,.75);
      display: grid; place-items: center; font-size: 36px;
    }
    .poster-info { padding: 10px 12px; }
    .poster-title { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .poster-sub { font-size: 11px; color: var(--muted); }
    .poster-fav { position: absolute; top: 8px; left: 8px; background: transparent; border: none; font-size: 18px; cursor: pointer; line-height: 1; padding: 2px; }

    /* ── Empty state ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h3 { font-size: 20px; color: var(--text); margin-bottom: 8px; }

    /* ── Modal detail ── */
    .modal { position: fixed; inset: 0; background: rgba(10,14,26,.85); display: none; place-items: center; z-index: 300; padding: 20px; }
    .modal.open { display: grid; }
    .modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; width: min(700px, 100%); max-height: 90vh; overflow-y: auto; box-shadow: var(--shadow); }
    .modal-hero { height: 220px; background: linear-gradient(160deg, #0d1f3c, #1a2e5a); display: grid; place-items: center; font-size: 80px; position: relative; border-radius: 14px 14px 0 0; }
    .modal-close { position: absolute; top: 14px; right: 14px; background: rgba(0,0,0,.5); color: #fff; border: none; border-radius: 6px; padding: 6px 10px; font-size: 18px; cursor: pointer; }
    .modal-body { padding: 24px; }
    .modal-title { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
    .modal-meta { display: flex; gap: 14px; font-size: 13px; color: var(--muted); margin-bottom: 16px; flex-wrap: wrap; }
    .modal-desc { font-size: 14px; color: #b0bcd0; line-height: 1.7; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .parental-block { text-align: center; padding: 24px; background: rgba(224,82,82,.08); border-radius: 8px; border: 1px solid rgba(224,82,82,.25); margin: 16px 0; }
    .parental-block h3 { color: var(--danger); margin-bottom: 8px; }

    /* ── Player ── */
    .player-section { background: #000; }
    .player-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
    .player-screen { position: absolute; inset: 0; display: grid; place-items: center; font-size: 72px; background: linear-gradient(180deg, #020b1a 0%, #04153a 100%); cursor: pointer; }
    .player-screen.playing::after { content: ""; }
    .player-screen .play-icon { transition: opacity .2s; }
    .player-screen.playing .play-icon { opacity: 0; }
    .player-controls { padding: 16px 24px; background: var(--surface); }
    .player-title { font-size: 16px; font-weight: 600; margin-bottom: 10px; }
    .seek-bar { width: 100%; height: 5px; background: var(--border); border-radius: 999px; appearance: none; accent-color: var(--gold); cursor: pointer; display: block; margin-bottom: 12px; }
    .player-buttons { display: flex; align-items: center; gap: 14px; }
    .player-buttons button { background: transparent; color: var(--text); font-size: 20px; padding: 6px; border-radius: 6px; }
    .player-buttons button:hover { background: var(--surface2); }
    .player-time { font-size: 13px; color: var(--muted); margin-left: auto; }
    .quality-select { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 4px 8px; font: inherit; font-size: 13px; }
    .episodes-list { padding: 16px 24px 24px; }
    .episodes-list h3 { font-size: 16px; margin-bottom: 12px; }
    .episode-item { display: flex; gap: 14px; align-items: center; padding: 10px; border-radius: 8px; cursor: pointer; }
    .episode-item:hover, .episode-item.active { background: var(--surface2); }
    .episode-thumb { width: 80px; height: 48px; background: var(--surface2); border-radius: 6px; display: grid; place-items: center; font-size: 20px; flex-shrink: 0; }
    .episode-info .ep-title { font-size: 13px; font-weight: 600; }
    .episode-info .ep-duration { font-size: 12px; color: var(--muted); margin-top: 2px; }

    /* ── Toast ── */
    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; font-size: 14px; display: none; box-shadow: var(--shadow); z-index: 400; max-width: 320px; }
    .toast.show { display: block; animation: slideIn .25s ease; }
    @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    /* ── Kids mode ── */
    .kids-mode { background: var(--kids-bg); }
    .kids-topbar { background: #102040; padding: 16px 28px; display: flex; align-items: center; gap: 16px; border-bottom: 2px solid var(--kids-accent); }
    .kids-brand { font-size: 22px; font-weight: 900; color: var(--kids-accent); }
    .kids-hero { padding: 40px 48px; background: linear-gradient(135deg, #102040, #1a3a5a); }
    .kids-hero h2 { font-size: 32px; font-weight: 900; margin-bottom: 8px; color: var(--text); }
    .kids-posters .poster-thumb { height: 180px; font-size: 56px; }
    .kids-lock-screen { text-align: center; padding: 60px 20px; }
    .kids-lock-screen h2 { font-size: 24px; margin-bottom: 8px; }
    .pin-inputs { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }
    .pin-inputs input { width: 44px; height: 52px; text-align: center; font-size: 24px; background: var(--surface2); border: 2px solid var(--border); border-radius: 8px; color: var(--text); font: inherit; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .hero { padding: 24px 20px; min-height: 300px; }
      .hero::before { display: none; }
      .hero-title { font-size: 26px; }
      .filters-bar, .section { padding-left: 20px; padding-right: 20px; }
      .topbar { padding: 0 16px; gap: 10px; }
      .topbar-nav { display: none; }
      .profiles-grid { grid-template-columns: repeat(2, 140px); }
      .posters-row { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); }
    }
  </style>
</head>
<body>

<!-- ── TOPBAR ── -->
<header class="topbar">
  <div class="brand"><span class="brand-icon">✝</span> FaithStream</div>
  <nav class="topbar-nav">
    <button class="active" data-section="home">Inicio</button>
    <button data-section="series">Series</button>
    <button data-section="documentales">Documentales</button>
    <button data-section="musica">Música</button>
    <button data-section="kids" id="kidsNavBtn">Familia</button>
  </nav>
  <div class="topbar-search">
    <input type="search" id="searchInput" placeholder="Buscar series, predicadores, temas...">
  </div>
  <div class="topbar-right">
    <a class="mock-badge" href="../../../../prototype/index.html" style="color:inherit;text-decoration:none">← Hub</a>
    <button class="profile-btn" id="profileToggle">
      <span class="profile-avatar" id="profileAvatar">M</span>
      <span id="profileName">Marcos</span> ▾
    </button>
  </div>
</header>

<!-- ── PROFILE SELECTOR ── -->
<div class="overlay" id="profileOverlay">
  <div class="profile-select">
    <h2>¿Quién está viendo?</h2>
    <div class="profiles-grid">
      <div class="profile-card selected" data-profile="marcos" data-age="adult">
        <div class="av" style="background:#2a4a8a">👨</div>
        <div class="name">Marcos</div><div class="age">Todo el contenido</div>
      </div>
      <div class="profile-card" data-profile="sofia" data-age="adult">
        <div class="av" style="background:#5a2a8a">👩</div>
        <div class="name">Sofía</div><div class="age">Todo el contenido</div>
      </div>
      <div class="profile-card" data-profile="samuel" data-age="kids">
        <div class="av" style="background:#1a6a4a">🧒</div>
        <div class="name">Samuel</div><div class="age">Solo contenido familiar</div>
      </div>
      <div class="profile-card" data-profile="ana" data-age="teen">
        <div class="av" style="background:#8a4a1a">👧</div>
        <div class="name">Ana</div><div class="age">Hasta 16 años</div>
      </div>
    </div>
  </div>
</div>

<!-- ── MAIN CONTENT ── -->
<main id="mainContent"></main>

<!-- ── MODAL DETAIL ── -->
<div class="modal" id="detailModal">
  <div class="modal-box" id="modalBox"></div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
  // ── Datos mock del dominio ─────────────────────────────────────────────────
  const profiles = {
    marcos: { name: "Marcos", avatar: "M", age: "adult", color: "#2a4a8a" },
    sofia:  { name: "Sofía",  avatar: "S", age: "adult", color: "#5a2a8a" },
    samuel: { name: "Samuel", avatar: "🧒", age: "kids",  color: "#1a6a4a" },
    ana:    { name: "Ana",    avatar: "A", age: "teen",  color: "#8a4a1a" },
  };

  const content = [
    { id: 1, icon: "⛪", title: "El Sermón del Monte", category: "Series", age: "todos", episodes: 12, progress: 60, rating: "Todo público", desc: "Un recorrido profundo por las bienaventuranzas y las enseñanzas fundamentales de Jesús." },
    { id: 2, icon: "✝", title: "Apocalipsis: Las Últimas Señales", category: "Documentales", age: "14+", episodes: 6, progress: 0, rating: "+14", desc: "Análisis profético sobre los eventos descritos en el libro de Apocalipsis." },
    { id: 3, icon: "🕊️", title: "La Vida del Apóstol Pablo", category: "Series", age: "todos", episodes: 8, progress: 25, rating: "Todo público", desc: "Dramatización histórica del ministerio de Pablo desde Damasco hasta Roma." },
    { id: 4, icon: "🎵", title: "Himnos de la Iglesia Primitiva", category: "Música", age: "todos", episodes: 1, progress: 0, rating: "Todo público", desc: "Colección de himnos históricos con contexto histórico y teológico." },
    { id: 5, icon: "🌟", title: "Historia Bíblica para Niños", category: "Familia", age: "kids", episodes: 24, progress: 80, rating: "Familiar", desc: "Aventuras animadas de los grandes personajes de la Biblia para toda la familia." },
    { id: 6, icon: "📖", title: "Génesis: El Principio", category: "Documentales", age: "todos", episodes: 4, progress: 0, rating: "Todo público", desc: "Exploración científica y teológica de los primeros capítulos del Génesis." },
    { id: 7, icon: "🙏", title: "El Poder de la Oración", category: "Series", age: "todos", episodes: 10, progress: 0, rating: "Todo público", desc: "Testimonios reales y enseñanzas sobre la oración intercesora." },
    { id: 8, icon: "🎶", title: "Alabanza Contemporánea", category: "Música", age: "todos", episodes: 1, progress: 45, rating: "Todo público", desc: "Los mejores éxitos del movimiento de alabanza contemporánea latinoamericana." },
  ];

  const episodes = [
    { num: 1, title: "El Contexto Histórico", duration: "38 min", icon: "📜" },
    { num: 2, title: "Las Bienaventuranzas", duration: "42 min", icon: "✝" },
    { num: 3, title: "La Ley y los Profetas", duration: "36 min", icon: "📖" },
    { num: 4, title: "El Padrenuestro", duration: "40 min", icon: "🙏" },
    { num: 5, title: "Las Puertas del Reino", duration: "44 min", icon: "⛪" },
  ];

  // ── Estado de la aplicación ────────────────────────────────────────────────
  const app = {
    profile: "marcos",
    section: "home",
    filter: "todos",
    playing: false,
    seekPos: 34,
    favorites: new Set([3, 7]),
    currentEpisode: 2,
    searchQuery: "",
  };

  // ── Utilidades ─────────────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.querySelector("#toast");
    t.textContent = msg;
    t.className = "toast show";
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = "toast", 2800);
  }

  function canWatch(item) {
    const age = profiles[app.profile].age;
    if (age === "adult") return true;
    if (age === "kids") return item.age === "kids" || item.age === "todos";
    if (age === "teen") return item.age !== "adult";
    return item.age === "todos";
  }

  function posterHTML(item) {
    const blocked = !canWatch(item);
    const isFav = app.favorites.has(item.id);
    const hasProgress = item.progress > 0 && !blocked;
    return `
      <article class="poster" data-id="${item.id}" role="button" tabindex="0" aria-label="${item.title}">
        <button class="poster-fav" data-fav="${item.id}" title="${isFav ? "Quitar de mi lista" : "Agregar a mi lista"}">${isFav ? "❤️" : "🤍"}</button>
        <div class="poster-thumb">
          <span>${item.icon}</span>
          <span class="age-badge">${item.rating}</span>
          ${blocked ? `<div class="locked-overlay">🔒</div>` : ""}
          ${hasProgress ? `<div class="progress-bar-mini"><div class="progress-fill" style="width:${item.progress}%"></div></div>` : ""}
        </div>
        <div class="poster-info">
          <div class="poster-title">${item.title}</div>
          <div class="poster-sub">${item.category} · ${item.episodes} ep.</div>
        </div>
      </article>`;
  }

  // ── Vistas ─────────────────────────────────────────────────────────────────
  function renderHome() {
    const featured = content[0];
    const continuar = content.filter(c => c.progress > 0 && canWatch(c));
    const recomendados = content.filter(c => c.progress === 0 && canWatch(c));
    const filtered = app.searchQuery
      ? content.filter(c => c.title.toLowerCase().includes(app.searchQuery.toLowerCase()))
      : null;

    if (app.searchQuery && filtered.length === 0) {
      return `
        <div class="section">
          <div class="empty-state">
            <div class="icon">🔍</div>
            <h3>Sin resultados para "${app.searchQuery}"</h3>
            <p style="color:var(--muted);margin-top:8px">Intenta con otro título, predicador o tema bíblico.</p>
            <button class="btn-secondary" style="margin-top:18px" onclick="clearSearch()">Limpiar búsqueda</button>
          </div>
        </div>`;
    }

    if (app.searchQuery) {
      return `
        <div class="section">
          <div class="section-title"><span class="icon">🔍</span> Resultados para "${app.searchQuery}"</div>
          <div class="posters-row">${filtered.map(posterHTML).join("")}</div>
        </div>`;
    }

    return `
      <div class="hero">
        <div class="hero-content">
          <span class="hero-badge">CONTINÚA VIENDO</span>
          <h1 class="hero-title">${featured.title}</h1>
          <p class="hero-desc">${featured.desc}</p>
          <div class="hero-actions">
            <button class="btn-primary" data-play="${featured.id}">▶ Reproducir</button>
            <button class="btn-secondary" data-id="${featured.id}">+ Mi lista</button>
          </div>
          <div class="hero-meta">
            <span>${featured.rating}</span>
            <span>${featured.episodes} episodios</span>
            <span>Temporada 1</span>
          </div>
        </div>
      </div>
      <div class="filters-bar">
        ${["todos","Series","Documentales","Música"].map(f =>
          `<button class="filter-btn ${app.filter===f?"active":""}" data-filter="${f}">${f==="todos"?"Todo el catálogo":f}</button>`
        ).join("")}
      </div>
      ${continuar.length ? `
        <div class="section">
          <div class="section-title"><span class="icon">▶</span> Continuar viendo</div>
          <div class="posters-row">${continuar.map(posterHTML).join("")}</div>
        </div>` : ""}
      <div class="section">
        <div class="section-title"><span class="icon">✨</span> Recomendados para ti</div>
        <div class="posters-row">${(app.filter==="todos" ? recomendados : recomendados.filter(c=>c.category===app.filter)).map(posterHTML).join("")}</div>
      </div>`;
  }

  function renderPlayer(item) {
    return `
      <div class="player-section">
        <div class="player-wrap">
          <div class="player-screen ${app.playing?"playing":""}" id="playerScreen" data-toggle-play>
            <span class="play-icon">${app.playing ? "⏸" : "▶"}</span>
          </div>
        </div>
        <div class="player-controls">
          <div class="player-title">${item.title} — Episodio ${app.currentEpisode}: ${episodes[app.currentEpisode-1]?.title ?? ""}</div>
          <input type="range" class="seek-bar" id="seekBar" min="0" max="100" value="${app.seekPos}" oninput="app.seekPos=this.value">
          <div class="player-buttons">
            <button title="Anterior" data-prev-ep>⏮</button>
            <button title="${app.playing?"Pausar":"Reproducir"}" data-toggle-play style="font-size:26px">${app.playing?"⏸":"▶"}</button>
            <button title="Siguiente" data-next-ep>⏭</button>
            <button title="Retroceder 10s" data-rewind>↩10</button>
            <button title="Activar subtítulos" data-subtitles>CC</button>
            <select class="quality-select"><option>Auto</option><option>1080p</option><option>720p</option><option>480p</option></select>
            <span class="player-time">${app.seekPos}:00 / 42:00</span>
            <button title="Pantalla completa" data-fullscreen style="margin-left:auto">⛶</button>
          </div>
        </div>
        <div class="episodes-list">
          <h3>Episodios — ${item.title}</h3>
          ${episodes.map(ep => `
            <div class="episode-item ${ep.num===app.currentEpisode?"active":""}" data-ep="${ep.num}">
              <div class="episode-thumb">${ep.icon}</div>
              <div class="episode-info">
                <div class="ep-title">Ep. ${ep.num}: ${ep.title}</div>
                <div class="ep-duration">${ep.duration}</div>
              </div>
              ${ep.num===app.currentEpisode ? `<span style="color:var(--gold);margin-left:auto;font-size:12px">▶ En curso</span>` : ""}
            </div>`).join("")}
        </div>
      </div>`;
  }

  function renderKids() {
    const kidsContent = content.filter(c => canWatch(c));
    return `
      <div class="kids-mode">
        <div class="kids-topbar">
          <span class="kids-brand">✝ FaithStream Familia</span>
          <button class="btn-secondary" style="margin-left:auto;font-size:13px" data-exit-kids>Salir del modo familiar 🔒</button>
        </div>
        <div class="kids-hero">
          <h2>¡Hola, ${profiles[app.profile].name}! 👋</h2>
          <p style="color:#8ab0d0">Contenido seleccionado especialmente para ti</p>
        </div>
        <div class="section kids-posters">
          <div class="section-title"><span class="icon">⭐</span> Tus historias favoritas</div>
          <div class="posters-row">${kidsContent.map(posterHTML).join("")}</div>
        </div>
      </div>`;
  }

  function renderKidsLock() {
    return `
      <div class="section">
        <div class="kids-lock-screen">
          <div style="font-size:60px;margin-bottom:16px">🔒</div>
          <h2>Salida protegida</h2>
          <p style="color:var(--muted);margin-bottom:12px">Ingresa el PIN familiar para continuar</p>
          <div class="pin-inputs">
            <input type="password" maxlength="1" class="pin-digit" inputmode="numeric">
            <input type="password" maxlength="1" class="pin-digit" inputmode="numeric">
            <input type="password" maxlength="1" class="pin-digit" inputmode="numeric">
            <input type="password" maxlength="1" class="pin-digit" inputmode="numeric">
          </div>
          <button class="btn-primary" data-pin-confirm>Confirmar PIN</button>
          <p style="font-size:12px;color:var(--muted);margin-top:12px">(PIN de demostración: 1234)</p>
        </div>
      </div>`;
  }

  // ── Renderizado principal ──────────────────────────────────────────────────
  function render() {
    const main = document.querySelector("#mainContent");
    if (app.section === "kids") { main.innerHTML = renderKids(); return; }
    if (app.section === "kidsLock") { main.innerHTML = renderKidsLock(); return; }
    if (app.section === "player") {
      const item = content.find(c => c.id === app.playingId);
      if (item) { main.innerHTML = renderPlayer(item); return; }
    }
    main.innerHTML = renderHome();
    // Refresh active nav
    document.querySelectorAll(".topbar-nav button").forEach(b => {
      b.classList.toggle("active", b.dataset.section === app.section);
    });
  }

  function clearSearch() {
    app.searchQuery = "";
    document.querySelector("#searchInput").value = "";
    render();
  }

  // ── Eventos ────────────────────────────────────────────────────────────────
  document.querySelector("#profileToggle").addEventListener("click", () => {
    document.querySelector("#profileOverlay").classList.add("open");
  });

  document.querySelector("#profileOverlay").addEventListener("click", (e) => {
    const card = e.target.closest("[data-profile]");
    if (!card) return;
    app.profile = card.dataset.profile;
    const p = profiles[app.profile];
    document.querySelector("#profileAvatar").textContent = p.avatar;
    document.querySelector("#profileAvatar").style.background = p.color;
    document.querySelector("#profileName").textContent = p.name;
    document.querySelector("#profileOverlay").classList.remove("open");
    if (p.age === "kids") { app.section = "kids"; }
    else { app.section = "home"; }
    render();
    showToast(`Perfil activo: ${p.name}`);
  });

  document.querySelector("#searchInput").addEventListener("input", (e) => {
    app.searchQuery = e.target.value.trim();
    app.section = "home";
    render();
  });

  document.querySelector("#mainContent").addEventListener("click", (e) => {
    // Poster open
    const poster = e.target.closest(".poster[data-id]");
    if (poster && !e.target.closest("[data-fav]")) {
      const item = content.find(c => c.id === Number(poster.dataset.id));
      if (!item) return;
      openDetail(item);
    }
    // Favorite toggle
    const fav = e.target.closest("[data-fav]");
    if (fav) {
      const id = Number(fav.dataset.fav);
      if (app.favorites.has(id)) { app.favorites.delete(id); showToast("Eliminado de tu lista"); }
      else { app.favorites.add(id); showToast("❤️ Agregado a tu lista"); }
      render();
    }
    // Play from hero
    const playBtn = e.target.closest("[data-play]");
    if (playBtn) { app.playingId = Number(playBtn.dataset.play); app.section = "player"; app.playing = true; render(); }
    // Filter
    const filterBtn = e.target.closest("[data-filter]");
    if (filterBtn) { app.filter = filterBtn.dataset.filter; render(); }
    // Section nav
    const navBtn = e.target.closest("[data-section]");
    if (navBtn) {
      app.section = navBtn.dataset.section;
      app.searchQuery = "";
      document.querySelector("#searchInput").value = "";
      render();
    }
    // Player controls
    if (e.target.closest("[data-toggle-play]")) { app.playing = !app.playing; render(); }
    if (e.target.closest("[data-next-ep]")) { app.currentEpisode = Math.min(episodes.length, app.currentEpisode + 1); showToast("Siguiente episodio"); render(); }
    if (e.target.closest("[data-prev-ep]")) { app.currentEpisode = Math.max(1, app.currentEpisode - 1); showToast("Episodio anterior"); render(); }
    if (e.target.closest("[data-subtitles]")) { showToast("Subtítulos en español activados"); }
    if (e.target.closest("[data-fullscreen]")) { showToast("Pantalla completa — solo disponible en producción"); }
    if (e.target.closest("[data-rewind]")) { app.seekPos = Math.max(0, app.seekPos - 10); render(); }
    // Episode select
    const epItem = e.target.closest("[data-ep]");
    if (epItem) { app.currentEpisode = Number(epItem.dataset.ep); app.playing = true; render(); }
    // Exit kids
    if (e.target.closest("[data-exit-kids]")) { app.section = "kidsLock"; render(); }
    // PIN confirm
    if (e.target.closest("[data-pin-confirm]")) {
      const digits = [...document.querySelectorAll(".pin-digit")].map(i=>i.value).join("");
      if (digits === "1234") { app.profile = "marcos"; app.section = "home"; render(); showToast("Modo familiar cerrado"); }
      else { showToast("PIN incorrecto. Intenta de nuevo."); }
    }
  });

  document.querySelector("#mainContent").addEventListener("click", (e) => {
    const topBtn = e.target.closest(".topbar-nav button[data-section]");
    if (topBtn) {
      app.section = topBtn.dataset.section;
      render();
    }
  });

  document.querySelector(".topbar-nav").addEventListener("click", (e) => {
    const btn = e.target.closest("button[data-section]");
    if (!btn) return;
    app.section = btn.dataset.section;
    app.searchQuery = "";
    document.querySelector("#searchInput").value = "";
    render();
    document.querySelectorAll(".topbar-nav button").forEach(b =>
      b.classList.toggle("active", b.dataset.section === app.section));
  });

  // ── Modal de detalle ───────────────────────────────────────────────────────
  function openDetail(item) {
    const modal = document.querySelector("#detailModal");
    const blocked = !canWatch(item);
    document.querySelector("#modalBox").innerHTML = `
      <div class="modal-hero">
        <span>${item.icon}</span>
        <button class="modal-close" data-close-modal>✕</button>
      </div>
      <div class="modal-body">
        <h2 class="modal-title">${item.title}</h2>
        <div class="modal-meta">
          <span>${item.rating}</span>
          <span>${item.episodes} episodios</span>
          <span>${item.category}</span>
          ${item.progress > 0 ? `<span style="color:var(--gold)">▶ ${item.progress}% visto</span>` : ""}
        </div>
        <p class="modal-desc">${item.desc}</p>
        ${blocked ? `
          <div class="parental-block">
            <h3>🔒 Contenido restringido</h3>
            <p>Este contenido no está disponible para el perfil <strong>${profiles[app.profile].name}</strong>.</p>
            <p style="font-size:13px;color:var(--muted);margin-top:8px">Cambia al perfil adulto o solicita acceso al administrador familiar.</p>
          </div>` : `
          <div class="modal-actions">
            <button class="btn-primary" data-play="${item.id}" data-close-modal>▶ Reproducir</button>
            <button class="btn-secondary" data-fav="${item.id}" data-close-modal>${app.favorites.has(item.id)?"❤️ En mi lista":"+ Mi lista"}</button>
          </div>`}
      </div>`;
    modal.classList.add("open");
    document.querySelector("[data-close-modal]").addEventListener("click", () => {
      modal.classList.remove("open");
    });
    if (!blocked) {
      document.querySelector("[data-play]")?.addEventListener("click", () => {
        app.playingId = item.id; app.section = "player"; app.playing = true;
        modal.classList.remove("open");
        render();
      });
    }
  }

  document.querySelector("#detailModal").addEventListener("click", (e) => {
    if (e.target === document.querySelector("#detailModal")) {
      document.querySelector("#detailModal").classList.remove("open");
    }
  });

  // ── Init ───────────────────────────────────────────────────────────────────
  render();
</script>
</body>
</html>

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wakaya-erp-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/raphaelparedes/wakaya-erp.git
    targetRevision: main
    path: ops/gitops/argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

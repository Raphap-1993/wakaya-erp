apiVersion: apps/v1
kind: Deployment
metadata:
  name: wakaya-erp-api
  labels:
    app.kubernetes.io/name: wakaya-erp-api
    app.kubernetes.io/part-of: wakaya-erp
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: wakaya-erp-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wakaya-erp-api
        app.kubernetes.io/part-of: wakaya-erp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: api
          image: ghcr.io/raphaelparedes/wakaya-erp:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: APP_VERSION
              value: "${APP_VERSION}"
          envFrom:
            - configMapRef:
                name: wakaya-erp-config
            - secretRef:
                name: wakaya-erp-secrets
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits:   { cpu: "500m", memory: "512Mi" }
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 20
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: wakaya-erp-api
spec:
  selector:
    app.kubernetes.io/name: wakaya-erp-api
  ports:
    - name: http
      port: 80
      targetPort: http

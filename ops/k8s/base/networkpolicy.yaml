apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: wakaya-erp-api-default-deny
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: wakaya-erp-api
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              role: ingress
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: ingress-controller
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              role: database
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - namespaceSelector:
            matchLabels:
              role: observability
      ports:
        - protocol: TCP
          port: 4317

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: wakaya-erp-dev

resources:
  - ../../base

patches:
  - target: { kind: Deployment, name: wakaya-erp-api }
    patch: |
      - op: replace
        path: /spec/replicas
        value: 1
  - target: { kind: HorizontalPodAutoscaler, name: wakaya-erp-api }
    patch: |
      - op: replace
        path: /spec/minReplicas
        value: 1
      - op: replace
        path: /spec/maxReplicas
        value: 2

images:
  - name: ghcr.io/raphaelparedes/wakaya-erp
    newTag: dev

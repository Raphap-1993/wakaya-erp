apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: wakaya-erp-api-canary
spec:
  replicas: 4
  strategy:
    canary:
      canaryService: wakaya-erp-api-canary
      stableService: wakaya-erp-api
      trafficRouting:
        alb:
          ingress: wakaya-erp-api
          servicePort: 80
      steps:
        - setWeight: 10
        - pause: { duration: 5m }
        - analysis:
            templates:
              - templateName: success-rate
            args:
              - name: service-name
                value: wakaya-erp-api-canary
        - setWeight: 25
        - pause: { duration: 10m }
        - setWeight: 50
        - pause: { duration: 10m }
        - setWeight: 75
        - pause: { duration: 10m }
  selector:
    matchLabels:
      app.kubernetes.io/name: wakaya-erp-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: wakaya-erp-api
    spec:
      containers:
        - name: api
          image: ghcr.io/raphaelparedes/wakaya-erp:latest
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet: { path: /api/health, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      interval: 1m
      successCondition: result[0] >= 0.99
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus.observability.svc:9090
          query: |
            sum(rate(http_requests_total{service="{{args.service-name}}",status!~"5.."}[2m]))
            /
            sum(rate(http_requests_total{service="{{args.service-name}}"}[2m]))
